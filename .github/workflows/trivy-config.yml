name: Trivy — Filesystem & IaC Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — filesystem scan (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "LawyerApp/"
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Trivy — IaC scan (Dockerfile, config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "LawyerApp/"
          format: "table"
          exit-code: "0"      # Informational for now
