name: Build & Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  DOTNET_VERSION: "8.0.x"
  PROJECT_PATH: "LawyerApp/LawyerApp.csproj"
  TEST_PROJECT_PATH: "LawyerApp.Tests/LawyerApp.Tests.csproj"
  COVERAGE_DIR: coverage

jobs:
  build-and-test:
    name: Build & Test (.NET ${{ matrix.os }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore LawyerApp/LawyerApp.sln

      - name: Build (Release)
        run: dotnet build LawyerApp/LawyerApp.sln -c Release --no-restore

      - name: Run tests with code coverage
        run: |
          dotnet test ${{ env.TEST_PROJECT_PATH }} \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ${{ env.COVERAGE_DIR }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ env.COVERAGE_DIR }}/*.trx

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_DIR }}/**/coverage.cobertura.xml
