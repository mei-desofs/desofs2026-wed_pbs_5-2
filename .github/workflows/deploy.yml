name: Deploy

# Continuous Deployment to GitHub Container Registry (ghcr.io).
#
# Trigger model:
#   - push to main          → build + push image to ghcr.io
#   - release published     → re-build with semver tags + attach SBOM to the
#                              release page
#   - workflow_dispatch     → manual override (same flow as push)
#
# What ships to ghcr.io:
#   - Image tags from docker/metadata-action:
#       :main                      (push to main)
#       :sha-<short>               (every build, content-addressable)
#       :latest                    (only on default branch)
#       :1.2.3   :1.2              (on semver-tagged releases)
#   - SLSA build provenance attestation (signed via OIDC, no key management)
#   - SBOM (built into docker/build-push-action via `sbom: true`)
#
# After the run, the image is pullable with the digest:
#   docker pull ghcr.io/<owner>/<repo>@sha256:<digest>

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image (production)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read           # checkout
      packages: write          # push to GHCR
      id-token: write          # OIDC token for sigstore attestation
      attestations: write      # write the attestation
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      image-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=LawyerApp
            org.opencontainers.image.description=Secure back-end for a legal consultancy firm (DESOFS 2026)
            org.opencontainers.image.vendor=Grupo Wed PBS 5-2

      - name: Build & push (with SBOM + provenance)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./LawyerApp
          file: ./LawyerApp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # In-toto SLSA provenance + SBOM emitted alongside the image
          provenance: mode=max
          sbom: true

      - name: Attest build provenance (signed, pushed to GHCR)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Deployment summary
        # All ${{ ... }} expressions are passed via `env:` to avoid the
        # semgrep `yaml.github-actions.security.run-shell-injection.run-shell-injection`
        # rule that flags any `github.*` / `steps.*.outputs.*` interpolation
        # inside a `run:` block.
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          {
            echo "## Production deployment complete"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Registry | \`${IMAGE_REF}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Tags | ${TAGS} |"
            echo "| Triggered by | \`${EVENT}\` on \`${REF}\` |"
            echo ""
            echo "### Pull command (immutable digest)"
            echo '```bash'
            echo "docker pull ${IMAGE_REF}@${DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  scan-published:
    name: Scan published image (post-deploy)
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read           # pull from GHCR
      security-events: write   # upload SARIF
    steps:
      - name: Checkout (needed for .trivyignore)
        uses: actions/checkout@v4

      - name: Log in to GHCR (read)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — scan published image at digest
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-name }}@${{ needs.build-and-push.outputs.digest }}
          format: sarif
          output: trivy-deploy.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: LawyerApp/.trivyignore
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF (post-deploy)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-deploy.sarif
          category: trivy-deploy

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deploy-report
          path: trivy-deploy.sarif
          retention-days: 30

  release-assets:
    name: Attach SBOM to GitHub Release
    if: github.event_name == 'release'
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write          # write release assets
      packages: read           # pull from GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR (read)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM of the published image (SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image-name }}@${{ needs.build-and-push.outputs.digest }}
          format: spdx-json
          output-file: lawyerapp-image-sbom.spdx.json
          upload-release-assets: true
