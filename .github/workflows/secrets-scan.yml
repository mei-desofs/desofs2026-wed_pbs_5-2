name: Secrets Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '7 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs the gitleaks binary directly. The gitleaks/gitleaks-action@v2
    # requires a paid license key for organization-owned repos
    # (see https://github.com/gitleaks/gitleaks-action#-announcement).
    # The binary itself is MIT-licensed and free for any use.
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.18.4
        run: |
          set -e
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run gitleaks (full history)
        id: gitleaks
        run: |
          set +e
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 1 \
            --verbose
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 30

      - name: Fail on findings
        if: steps.gitleaks.outputs.exit_code != '0'
        run: |
          echo "::error::Gitleaks detected secrets in the repository — see the gitleaks-report artifact and Security → Code scanning."
          exit 1

  trufflehog:
    name: TruffleHog (verified secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown
