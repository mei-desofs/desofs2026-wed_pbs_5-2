name: Secrets Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: '7 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs the gitleaks binary directly. The gitleaks/gitleaks-action@v2
    # requires a paid license key for organization-owned repos
    # (see https://github.com/gitleaks/gitleaks-action#-announcement).
    # The binary itself is MIT-licensed and free for any use.
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.18.4
        run: |
          set -e
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run gitleaks (full history)
        id: gitleaks
        run: |
          set +e
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            --exit-code 1 \
            --verbose
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 30

      - name: Fail on findings
        if: steps.gitleaks.outputs.exit_code != '0'
        run: |
          echo "::error::Gitleaks detected secrets in the repository — see the gitleaks-report artifact and Security → Code scanning."
          exit 1

  trufflehog:
    name: TruffleHog (verified secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Runs the trufflehog binary directly instead of the
    # trufflesecurity/trufflehog@main action. The action wraps a Docker
    # image hosted on ghcr.io which intermittently times out when pulled
    # from GitHub-hosted runners
    # (docker: Head https://ghcr.io/v2/.../manifests/latest:
    #  context deadline exceeded while awaiting headers).
    # The binary itself has no external runtime dependencies and is
    # installed in seconds.
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        env:
          TRUFFLEHOG_VERSION: 3.95.3
        run: |
          set -e
          curl -sSfL -o trufflehog.tar.gz \
            "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          tar -xzf trufflehog.tar.gz trufflehog
          sudo mv trufflehog /usr/local/bin/
          rm trufflehog.tar.gz
          trufflehog --version

      # `--results=verified` (without `unknown`) is the TruffleHog
      # upstream default and the right choice for a CI gate. "Verified"
      # means TruffleHog could authenticate with the credential against
      # the issuer's API — no false positives by definition. "Unknown"
      # findings (high-entropy strings that match a detector pattern but
      # can't be live-verified) are noisy in full-history scans because
      # documentation example strings like `Password=postgres` trigger
      # them; we trust Gitleaks (which scans full history with the
      # default ruleset) to surface those.

      # Pull-request scan: compare the PR's HEAD against its base SHA.
      - name: TruffleHog (PR diff)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          trufflehog git "file://${PWD}" \
            --since-commit "$BASE_SHA" \
            --branch "$HEAD_SHA" \
            --results=verified \
            --fail \
            --no-update

      # Push / schedule / dispatch: scan the full git history.
      - name: TruffleHog (full history)
        if: github.event_name != 'pull_request'
        run: |
          trufflehog git "file://${PWD}" \
            --results=verified \
            --fail \
            --no-update
