# Gitleaks configuration for LawyerApp
# https://github.com/gitleaks/gitleaks#configuration
#
# This file extends the default gitleaks ruleset with project-specific
# allowlists that suppress documented false positives.

[extend]
useDefault = true

[allowlist]
description = "Documented false positives — reviewed by Pipeline owner."

# .NET assembly PublicKeyToken values are public identifiers for signed
# assemblies (e.g. System.Web has PublicKeyToken=b03f5f7f11d50a3a). They are
# the SHA-1 of the assembly's public key — published in every .NET binary —
# and are NOT secrets. Gitleaks' "generic-api-key" rule mistakes them for
# random hex tokens because of their entropy.
regexes = [
    '''PublicKeyToken=[0-9a-fA-F]{16}''',
]

# Visual Studio's `.vs/` folder (committed historically by the team before
# .gitignore was tightened in commit 7e33e6f — file is no longer in HEAD but
# remains in git history, so the full-history scan still surfaces it).
paths = [
    '''(^|/)\.vs/''',
    '''(^|/)bin/''',
    '''(^|/)obj/''',
]

# If specific Gitleaks fingerprints reappear after the above allowlists,
# add them here with a reviewed-on date. Format:
# stopwords = ["fingerprint:..."]
